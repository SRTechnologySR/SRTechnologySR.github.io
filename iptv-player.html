<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Web Player • TechnologySR</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1020;
  color:#fff;
}
.header{
  padding:15px 25px;
  background:#111735;
  font-size:20px;
  font-weight:bold;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}
input{
  width:100%;
  padding:14px;
  border-radius:8px;
  border:none;
  font-size:15px;
}
button{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#00eaff;
  font-weight:bold;
  cursor:pointer;
}
video{
  width:100%;
  margin-top:30px;
  border-radius:15px;
  background:#000;
}
.note{
  color:#9fb3ff;
  font-size:14px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="header">TechnologySR IPTV Web</div>

<div class="container">
  <h2>IPTV Web Player</h2>
  <p class="note">
    Paste your legal M3U8 / stream URL below to play in browser.
  </p>

  <input id="streamUrl" placeholder="https://example.com/stream.m3u8">
  <button onclick="playStream()">Play</button>

  <video id="video" controls autoplay></video>
</div>

<script>
function playStream(){
  var url = document.getElementById("streamUrl").value;
  var video = document.getElementById("video");

  if(Hls.isSupported()){
    var hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src = url;
  }
}
</script>

</body>
</html>
