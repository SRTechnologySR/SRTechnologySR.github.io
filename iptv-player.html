<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPTV Player – TechnologySR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b132b;
  color:#fff;
  font-family:system-ui,Arial;
}
.top{
  padding:12px;
  text-align:center;
  font-size:20px;
  font-weight:600;
}
.layout{
  display:flex;
  height:calc(100vh - 60px);
}
.list{
  width:35%;
  overflow:auto;
  border-right:1px solid #1c2541;
}
.item{
  padding:10px;
  border-bottom:1px solid #1c2541;
  cursor:pointer;
}
.item:hover{
  background:#1c2541;
}
.player{
  width:65%;
  display:flex;
  align-items:center;
  justify-content:center;
}
video{
  width:95%;
  background:#000;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="top">TechnologySR IPTV Player</div>

<div class="layout">
  <div class="list" id="channels"></div>
  <div class="player">
    <video id="video" controls autoplay></video>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const PLAYLIST =
"https://raw.githubusercontent.com/TechnologySR/TechnologySR.github.io/main/iptv/index.m3u";

const box = document.getElementById("channels");
const video = document.getElementById("video");

fetch(PLAYLIST)
.then(r=>r.text())
.then(text=>{
  const lines=text.split("\n");
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("#EXTINF")){
      const name=lines[i].split(",")[1];
      const url=lines[i+1];
      if(name && url){
        const div=document.createElement("div");
        div.className="item";
        div.textContent=name;
        div.onclick=()=>play(url.trim());
        box.appendChild(div);
      }
    }
  }
});

function play(url){
  if(Hls.isSupported() && url.includes(".m3u8")){
    const hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src=url;
  }
}
</script>

</body>
</html>
