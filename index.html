<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechnologySR</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1020;
  color:#fff;
  text-align:center;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}
h1{
  font-size:42px;
  margin-bottom:10px;
}
.tagline{
  color:#9fb3ff;
  font-size:18px;
  margin-bottom:30px;
}
.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
}
.primary{
  background:#00eaff;
  color:#000;
}
.secondary{
  border:2px solid #00eaff;
  color:#00eaff;
}
.cards{
  margin-top:50px;
  display:grid;
  gap:20px;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}
.card{
  background:#141a33;
  padding:30px;
  border-radius:18px;
}
footer{
  margin-top:60px;
  font-size:14px;
  color:#9fb3ff;
}
</style>

</head>
<body>

<div class="container">
  <h1>TechnologySR</h1>
  <div class="tagline">Technology • IPTV • Digital Media</div>

  <a href="explore.html" class="btn primary">Explore More</a>
  <a href="https://youtube.com/@SRTechnologySR" target="_blank" class="btn secondary">YouTube</a>

  <div class="cards">
    <div class="card">
      <h2>IPTV</h2>
      <p>Information and guidance related to IPTV and streaming technologies.</p>
    </div>

    <div class="card">
      <h2>Digital Media</h2>
      <p>Understanding entertainment platforms and evolving digital trends.</p>
    </div>
  </div>

  <footer>
    Built with GitHub Pages • TechnologySR
  </footer>
</div>

</body>
</html>
