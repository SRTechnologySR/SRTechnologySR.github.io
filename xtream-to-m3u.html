<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xtream to M3U Converter</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0b1020,#0f1735);
  color:#fff;
}
.box{
  max-width:520px;
  margin:80px auto;
  background:#141a33;
  padding:35px;
  border-radius:22px;
}
h1{
  text-align:center;
  margin-bottom:8px;
}
p{
  text-align:center;
  color:#9fb3ff;
  font-size:14px;
}
input{
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:10px;
  border:none;
  outline:none;
}
button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  background:#00eaff;
  cursor:pointer;
}
.actions{
  display:flex;
  gap:12px;
  margin-top:15px;
}
.actions button{
  width:100%;
  background:#0b1020;
  color:#00eaff;
  border:2px solid #00eaff;
}
.output{
  margin-top:20px;
  word-break:break-all;
  background:#0b1020;
  padding:15px;
  border-radius:10px;
  display:none;
  font-size:14px;
}
small{
  display:block;
  text-align:center;
  margin-top:20px;
  color:#9fb3ff;
}
</style>
</head>

<body>

<div class="box">
  <h1>Xtream ➜ M3U</h1>
  <p>Generate M3U playlist from Xtream Portal login</p>

  <input id="server" placeholder="Server URL (http://example.com:8080)">
  <input id="username" placeholder="Username">
  <input id="password" placeholder="Password">

  <button onclick="generate()">Generate M3U</button>

  <div class="output" id="result"></div>

  <div class="actions" id="actions" style="display:none;">
    <button onclick="copyLink()">Copy</button>
    <button onclick="downloadM3U()">Download</button>
  </div>

  <small>No playlists are hosted on this site</small>
</div>

<script>
let m3uLink = "";

function generate(){
  let server = document.getElementById("server").value.trim();
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();

  if(!server || !user || !pass){
    alert("Fill all fields");
    return;
  }

  m3uLink = server + "/get.php?username=" + user + "&password=" + pass + "&type=m3u_plus";

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = "<b>M3U Link:</b><br>" + m3uLink;
  document.getElementById("actions").style.display = "flex";
}

function copyLink(){
  navigator.clipboard.writeText(m3uLink);
  alert("Copied to clipboard");
}

function downloadM3U(){
  let content = "#EXTM3U\n" + m3uLink;
  let blob = new Blob([content], { type: "audio/x-mpegurl" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "playlist.m3u";
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
