<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player • TechnologySR</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1020;
  color:#fff;
}
.header{
  background:#111735;
  padding:15px 20px;
  font-size:20px;
  font-weight:bold;
}
.app{
  display:flex;
  height:calc(100vh - 60px);
}
.channels{
  width:320px;
  background:#0f1735;
  overflow-y:auto;
  padding:15px;
}
.channel{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:8px;
  background:#141a33;
}
.channel:hover{
  background:#1b2450;
}
.player{
  flex:1;
  padding:15px;
}
video{
  width:100%;
  height:100%;
  background:#000;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="header">TechnologySR IPTV Web</div>

<div class="app">
  <div class="channels" id="channelList">
    Loading channels...
  </div>

  <div class="player">
    <video id="video" controls autoplay></video>
  </div>
</div>

<script>
const M3U_URL = "https://technologysr.github.io/main/index.m3u";
const list = document.getElementById("channelList");
const video = document.getElementById("video");

fetch(M3U_URL)
  .then(res => res.text())
  .then(data => {
    const lines = data.split("\n");
    list.innerHTML = "";

    for(let i=0;i<lines.length;i++){
      if(lines[i].startsWith("#EXTINF")){
        const name = lines[i].split(",")[1];
        const url = lines[i+1];

        const div = document.createElement("div");
        div.className = "channel";
        div.textContent = name;

        div.onclick = () => play(url);
        list.appendChild(div);
      }
    }
  })
  .catch(()=>{
    list.innerHTML = "Failed to load playlist";
  });

function play(url){
  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src = url;
  }
}
</script>

</body>
</html>
