<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U Generator | TechnologySR</title>

<style>
body{
    margin:0;
    font-family:Inter, Arial, sans-serif;
    background:#0f172a;
    color:#fff;
}
.container{
    max-width:700px;
    margin:auto;
    padding:60px 20px;
}
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:none;
}
button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}
.result{
    margin-top:20px;
}
a{color:#60a5fa;text-decoration:none;}
</style>
</head>

<body>
<div class="container">
    <h1>M3U Playlist Generator</h1>
    <p>Generate an M3U URL using Xtream-style portal credentials.</p>

    <form id="form">
        <input id="portal" placeholder="Portal URL (http://example.com:8080)" required>
        <input id="user" placeholder="Username" required>
        <input id="pass" placeholder="Password" required>
        <button type="submit">Generate M3U</button>
    </form>

    <div class="result" id="result" style="display:none;">
        <p>M3U Playlist URL:</p>
        <input id="output" readonly>
    </div>

    <p style="margin-top:30px;">
        <a href="explore.html">← Back to Explore</a>
    </p>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const portal = document.getElementById("portal").value.replace(/\/$/, "");
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    const m3u = portal +
        "/get.php?username=" + encodeURIComponent(user) +
        "&password=" + encodeURIComponent(pass) +
        "&type=m3u_plus&output=ts";

    document.getElementById("output").value = m3u;
    document.getElementById("result").style.display = "block";
});
</script>

</body>
</html>
