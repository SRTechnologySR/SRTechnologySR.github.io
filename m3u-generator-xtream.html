<script>
function generateM3U(){
  let s = document.getElementById("server").value.trim();
  let u = document.getElementById("username").value.trim();
  let p = document.getElementById("password").value.trim();

  if(!s || !u || !p){
    alert("Please fill all fields");
    return;
  }

  if(!s.startsWith("http://") && !s.startsWith("https://")){
    s = "http://" + s;
  }

  if(s.endsWith("/")){
    s = s.slice(0, -1);
  }

  const link = s + "/get.php?username=" + u + "&password=" + p + "&type=m3u_plus";
  document.getElementById("result").value = link;
}

function copyM3U(){
  const text = document.getElementById("result");
  if(!text.value){
    alert("Generate M3U first");
    return;
  }
  text.select();
  document.execCommand("copy");
  alert("M3U link copied!");
}

function downloadM3U(){
  const data = document.getElementById("result").value;
  if(!data){
    alert("Generate M3U first");
    return;
  }

  const blob = new Blob([data], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "playlist.m3u";
  a.click();

  URL.revokeObjectURL(url);
}
</script>
